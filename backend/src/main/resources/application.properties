spring.application.name=smart-grading-system
server.port=${PORT:8080}

# Database Connection (H2 for Local Testing)
spring.datasource.url=jdbc:h2:file:./data/smartgrading;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# HikariCP Connection Pool - tuned for Supabase free tier
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.initialization-fail-timeout=-1

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false


# JWT Configuration
# Use a secure random string for JWT secret in production
jwt.secret=ODdkNDZiODU2NWE0NDM1ODgyY2Q4ZDE3MmVhYjZiODAxYTIzOTkyMmJkNTE0NmNmYWRhZDBkYTJhZTUyZmI5Nw==
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Note: The database credentials should be injected via environment variables in Render

# Initialize schema from data.sql
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
logging.level.org.springframework.security=DEBUG
